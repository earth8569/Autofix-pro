<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoFix Pro — Repair Shop Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- APP SHELL — Hidden until login succeeds -->
  <div class="app-shell" style="display:none">
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand" onclick="closeSidebar()">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        <div>
          <div class="brand-name">AutoFix Pro</div>
          <div class="brand-sub" id="brand-sub">Repair Shop Manager</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-user" id="sidebar-user"></div>
      <div class="sidebar-footer">
        <div class="lang-toggle">
          <button class="lang-btn" id="lb-en" onclick="setLang('en')">EN</button>
          <button class="lang-btn" id="lb-th" onclick="setLang('th')">ภาษาไทย</button>
        </div>
        <small>v1.0 — Home Edition</small>
        <small id="sidebar-data-note">Data saved in browser</small>
      </div>
    </aside>
    <header class="topbar">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <span class="topbar-title">AutoFix Pro</span>
      <button class="btn-icon" style="margin-left:auto" onclick="logout()" title="Logout">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </header>
    <main class="main-content" id="main-content" onclick="closeSidebar()"></main>
  </div>

  <div id="toast-container"></div>

  <!-- JS loaded in dependency order -->
  <script src="js/i18n.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/export.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
