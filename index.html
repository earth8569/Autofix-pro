<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoFix Pro — Repair Shop Manager</title>

  <!-- Google Fonts: DM Sans (body) + JetBrains Mono (mono/code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <!-- SheetJS for Excel export (loaded async, but available globally) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>

  <!-- App styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ============================================
       APP SHELL — Sidebar + Main Content Area
       ============================================ -->
  <div class="app-shell">

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand" onclick="closeSidebar()">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        <div>
          <div class="brand-name">AutoFix Pro</div>
          <div class="brand-sub">Repair Shop Manager</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Nav buttons are rendered by JS -->
      </nav>
      <div class="sidebar-footer">
        <small>v1.0 — Home Edition</small>
        <small>Data saved in browser</small>
      </div>
    </aside>

    <!-- Mobile top bar -->
    <header class="topbar">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <span class="topbar-title">AutoFix Pro</span>
    </header>

    <!-- Main content (pages rendered here by JS) -->
    <main class="main-content" id="main-content" onclick="closeSidebar()">
      <!-- Dynamic content injected by app.js -->
    </main>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- ============================================
       JS Modules — loaded in dependency order
       ============================================ -->
  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/export.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
